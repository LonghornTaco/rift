name: $(Year:yyyy).$(Month).$(DayOfMonth)$(Rev:.r)-$(SourceBranchName)

trigger:
  batch: true
  branches:
    include:
    - main

jobs:

- job: marketplace_build
  displayName: 'Build Marketplace App'
  pool:
    vmImage: 'ubuntu-latest'
  variables:
    appFolder: $(Build.SourcesDirectory)
    artifactFolder: $(Build.StagingDirectory)/marketplace
  steps:

  - task: NodeTool@0
    displayName: 'Use Node.js 22.x'
    inputs:
      versionSpec: '22.x'

  - task: Cache@2
    displayName: 'Cache npm packages'
    inputs:
      key: 'npm | "$(Agent.OS)" | $(appFolder)/package-lock.json'
      path: '$(appFolder)/node_modules'
      cacheHitVar: 'CACHE_RESTORED'

  - script: npm ci
    displayName: 'Install npm packages'
    condition: ne(variables.CACHE_RESTORED, 'true')
    workingDirectory: $(appFolder)

  - script: npm run build
    displayName: 'Build Next.js app'
    workingDirectory: $(appFolder)

  - ${{ if notin(variables['Build.Reason'], 'PullRequest') }}:

    - script: |
        mkdir -p $(artifactFolder)

        # Standalone output contains server.js at the root
        cp -r $(appFolder)/.next/standalone/. $(artifactFolder)/

        # Static assets and public files are not included in standalone
        cp -r $(appFolder)/.next/static $(artifactFolder)/.next/static
        if [ -d "$(appFolder)/public" ]; then
          cp -r $(appFolder)/public $(artifactFolder)/public
        fi
      displayName: 'Assemble standalone artifact'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Marketplace artifact'
      inputs:
        targetPath: '$(artifactFolder)'
        artifact: 'Marketplace'
        publishLocation: 'pipeline'
